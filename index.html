<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fletcher</title>
    <link rel="icon" type="image/svg+xml" href="/fletcher/favicon.svg" />
 
    <!--
      COOP/COEP are set via vite.config.js dev-server headers in development.
      In production (GitHub Pages) they are injected by the service worker below,
      which intercepts every response and adds the two headers before the app sees them.
      SharedArrayBuffer (needed by SQLite WASM) requires both headers.
    -->
    <script src="/fletcher/coi-serviceworker.js"></script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
 
    <!-- gapi is loaded dynamically after sign-in (see src/auth/google.js) -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
